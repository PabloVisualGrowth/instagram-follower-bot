<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Follower Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-primary: #833ab4;
            --accent-secondary: #fd1d1d;
            --accent-tertiary: #fcb045;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --green: #00f260;
            --red: #ff416c;
            --color-purple: #bb86fc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
        }

        .background-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: move 20s infinite alternate;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: var(--accent-primary);
            top: -100px;
            left: -100px;
        }

        .blob-2 {
            width: 350px;
            height: 350px;
            background: var(--accent-secondary);
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        .blob-3 {
            width: 300px;
            height: 300px;
            background: var(--accent-tertiary);
            top: 40%;
            left: 60%;
            animation-delay: -10s;
        }

        @keyframes move {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(100px, 100px) scale(1.2);
            }
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-secondary);
        }

        .logo-icon svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(45deg, var(--accent-primary), var(--accent-secondary), var(--accent-tertiary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
        }

        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 1.5rem;
        }

        .action-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 0.9rem;
        }

        .dot {
            width: 10px;
            height: 10px;
            background-color: var(--green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--green);
        }

        .primary-btn {
            background: linear-gradient(45deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            padding: 1rem 2.5rem;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 200px;
        }

        .primary-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(253, 29, 29, 0.3);
        }

        .primary-btn:active {
            transform: translateY(0);
        }

        /* Stats grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
        }

        .color-green {
            color: var(--green);
        }

        .color-red {
            color: var(--red);
        }

        .color-purple {
            color: var(--color-purple);
        }

        /* Lists and Content */
        .content-row {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 1.5rem;
        }

        h3 {
            font-size: 1rem;
            margin-bottom: 1rem;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .scrollable-list {
            max-height: 400px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .scrollable-list::-webkit-scrollbar {
            width: 4px;
        }

        .scrollable-list::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }

        .follower-item {
            padding: 0.8rem;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.03);
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            animation: fadeIn 0.5s ease backwards;
        }

        .follower-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(45deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.8rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .image-wrapper {
            width: 100%;
            height: 350px;
            border-radius: 10px;
            overflow: hidden;
            background: #111;
        }

        #screenshot-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        #screenshot-img:hover {
            transform: scale(1.05);
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .hidden {
            display: none;
        }

        footer {
            text-align: center;
            margin-top: 4rem;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            .content-row {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body class="dark-mode">
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <header>
            <div class="logo-area">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 16C14.2091 16 16 14.2091 16 12C16 9.79086 14.2091 8 12 8C9.79086 8 8 9.79086 8 12C8 14.2091 9.79086 16 12 16Z"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        <path
                            d="M3 16V8C3 5.23858 5.23858 3 8 3H16C18.7614 3 21 5.23858 21 8V16C21 18.7614 18.7614 21 16 21H8C5.23858 21 3 18.7614 3 16Z"
                            stroke="currentColor" stroke-width="2" />
                        <path d="M17.5 6.51L17.51 6.49889" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                </div>
                <h1>IG Tracker</h1>
            </div>
            <p class="subtitle">Monitoriza tus seguidores con sigilo avanzado</p>
        </header>

        <main>
            <div class="action-card glass">
                <div class="status-indicator">
                    <span class="dot"></span>
                    <span id="status-text">Listo para escanear</span>
                </div>
                <button id="run-bot-btn" class="primary-btn">
                    <span class="btn-content">Ejecutar Bot</span>
                    <span class="loader hidden"></span>
                </button>
            </div>

            <div id="results-area" class="hidden">
                <div class="stats-grid">
                    <div class="stat-box glass">
                        <span class="stat-label">Nuevos</span>
                        <span id="new-count" class="stat-value color-green">0</span>
                    </div>
                    <div class="stat-box glass">
                        <span class="stat-label">Unfollows</span>
                        <span id="unfollow-count" class="stat-value color-red">0</span>
                    </div>
                    <div class="stat-box glass">
                        <span class="stat-label">Total Real</span>
                        <span id="total-count" class="stat-value color-purple">0</span>
                    </div>
                </div>

                <div class="content-row">
                    <div class="list-container glass">
                        <h3>Lista de Seguidores</h3>
                        <div id="followers-list" class="scrollable-list">
                            <!-- Followers will be injected here -->
                        </div>
                    </div>

                    <div class="screenshot-container glass">
                        <h3>Última Captura</h3>
                        <div class="image-wrapper">
                            <img id="screenshot-img" src="" alt="Captura del bot">
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 IG Tracker Dashboard • IA Powered</p>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const runBtn = document.getElementById('run-bot-btn');
            const statusText = document.getElementById('status-text');
            const resultsArea = document.getElementById('results-area');
            const btnContent = document.querySelector('.btn-content');
            const loader = document.querySelector('.loader');
            const dot = document.querySelector('.dot');

            const newCount = document.getElementById('new-count');
            const unfollowCount = document.getElementById('unfollow-count');
            const totalCount = document.getElementById('total-count');
            const followersList = document.getElementById('followers-list');
            const screenshotImg = document.getElementById('screenshot-img');

            runBtn.addEventListener('click', async () => {
                runBtn.disabled = true;
                btnContent.classList.add('hidden');
                loader.classList.remove('hidden');
                statusText.innerText = "Ejecutando bot... por favor espera";
                dot.style.backgroundColor = "#ff9800";
                dot.style.boxShadow = "0 0 10px #ff9800";

                try {
                    const response = await fetch('/run-bot', {
                        method: 'POST'
                    });
                    const data = await response.json();

                    if (data.success) {
                        renderResults(data);
                        statusText.innerText = "Escaneo completado con éxito";
                        dot.style.backgroundColor = "#00f260";
                        dot.style.boxShadow = "0 0 10px #00f260";
                    } else {
                        statusText.innerText = "Error: " + data.error;
                        dot.style.backgroundColor = "#ff416c";
                        dot.style.boxShadow = "0 0 10px #ff416c";
                    }
                } catch (error) {
                    statusText.innerText = "Error de conexión con el servidor";
                    console.error(error);
                } finally {
                    runBtn.disabled = false;
                    btnContent.classList.remove('hidden');
                    loader.classList.add('hidden');
                }
            });

            function renderResults(data) {
                resultsArea.classList.remove('hidden');
                newCount.innerText = data.changes.new_followers.length;
                unfollowCount.innerText = data.changes.unfollowers.length;
                totalCount.innerText = data.followers.length;

                followersList.innerHTML = '';
                data.followers.sort().forEach((name, index) => {
                    const item = document.createElement('div');
                    item.className = 'follower-item';
                    item.style.animationDelay = `${index * 0.05}s`;
                    item.innerHTML = `
                        <span class="follower-avatar">${name.charAt(0).toUpperCase()}</span>
                        <span class="follower-name">${name}</span>
                    `;
                    followersList.appendChild(item);
                });

                screenshotImg.src = `/screenshots/ultimo_scrappeo.png?t=${new Date().getTime()}`;
            }
        });
    </script>
</body>

</html>
